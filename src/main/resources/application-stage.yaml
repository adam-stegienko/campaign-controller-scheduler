spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

cc-api-rest:
  base-url: ${CC_API_REST_BASE_URL:http://campaign-controller-api-stage.apps.stegienko.local}

google-ads-api:
  base-url: ${GOOGLE_ADS_API_BASE_URL:http://campaign-controller-google-api-stage.apps.stegienko.local}
  customer-id: ${GOOGLE_ADS_API_CUSTOMER_ID:}

# OpenAPI properties
springdoc:
  swagger-ui:
    enabled: false

logging:
  level:
    io.micrometer.tracing: WARN
    org.springframework.web: WARN
