spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

rabbitmq:
  exchange: test.campaign.controller.exchange
  queue: test.campaign.execution.queue
  routing-key: campaign.execute
  dlx: test.campaign.controller.dlx
  error-queue: test.campaign.execution.error.queue
  error-routing-key: campaign.execute.error

cc-api-rest:
  base-url: ${CC_API_REST_BASE_URL:http://campaign-controller-api-dev.apps.stegienko.local}

google-ads-api:
  base-url: ${GOOGLE_ADS_API_BASE_URL:http://campaign-controller-google-api-dev.apps.stegienko.local}
  customer-id: ${GOOGLE_ADS_API_CUSTOMER_ID:123456789}

# OpenAPI properties
springdoc:
  swagger-ui:
    enabled: true
    operations-sorter: method
    path: /swagger-ui
  api-docs:
    path: /api-docs

logging:
  level:
    io.micrometer.tracing: DEBUG
    org.springframework.web: DEBUG
